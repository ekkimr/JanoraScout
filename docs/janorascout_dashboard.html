<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JanoraScout — Academy Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #040a06;
  --surface:  #080f0a;
  --card:     #0c1510;
  --border:   #112018;
  --border2:  #1a3025;
  --green:    #00e676;
  --green2:   #69f0ae;
  --amber:    #ffab40;
  --red:      #ff5252;
  --blue:     #40c4ff;
  --purple:   #ea80fc;
  --text:     #c8d8cc;
  --muted:    #4a6855;
  --dim:      #1e3028;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRID LAYOUT ── */
.shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  grid-column: 1 / -1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.logo-mark {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 2px;
  color: #fff;
}
.logo-mark span { color: var(--green); }
.topbar-divider { width: 1px; height: 24px; background: var(--border); }
.session-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}
.session-tag strong { color: var(--green); }
.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0d2018;
  border: 1px solid #0d3520;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 1.4s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.avatar {
  width: 32px; height: 32px;
  background: var(--dim);
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
}
.sidebar-section {
  padding: 0 16px;
  margin-bottom: 24px;
}
.sidebar-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 3px;
  margin-bottom: 8px;
  padding: 0 4px;
}
.player-list { display: flex; flex-direction: column; gap: 2px; }
.player-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.player-item:hover { background: var(--dim); }
.player-item.active {
  background: #0a2018;
  border-color: var(--border2);
}
.player-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--muted);
  width: 24px;
  text-align: center;
  transition: color 0.15s;
}
.player-item.active .player-num { color: var(--green); }
.player-info { flex: 1; min-width: 0; }
.player-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-pos {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 1px;
}
.player-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
}

/* ── MAIN ── */
.main {
  overflow-y: auto;
  background: var(--bg);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── PLAYER HERO ── */
.player-hero {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: relative;
  overflow: hidden;
}
.player-hero::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, #00e67615 0%, transparent 70%);
  pointer-events: none;
}
.hero-number {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 72px;
  line-height: 1;
  color: var(--border2);
  letter-spacing: -2px;
  user-select: none;
}
.hero-info { flex: 1; }
.hero-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 1px;
  color: #fff;
  line-height: 1;
}
.hero-meta {
  display: flex;
  gap: 12px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.hero-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 3px;
  letter-spacing: 1px;
}
.hero-tag.pos { background: #0d2018; color: var(--green); border: 1px solid #0d3520; }
.hero-tag.age { background: var(--dim); color: var(--muted); }
.hero-tag.session { background: var(--dim); color: var(--muted); }

.hero-score-area {
  text-align: center;
  padding: 0 20px;
  border-left: 1px solid var(--border);
}
.score-ring {
  position: relative;
  width: 80px;
  height: 80px;
  margin: 0 auto 8px;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring-bg { stroke: var(--dim); fill: none; stroke-width: 5; }
.score-ring-fill { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-val {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #fff;
}
.score-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
}

.hero-trend {
  padding: 0 20px;
  border-left: 1px solid var(--border);
}
.trend-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.trend-sparkline { display: flex; align-items: flex-end; gap: 3px; height: 40px; }
.spark-bar {
  width: 10px;
  border-radius: 2px 2px 0 0;
  transition: opacity 0.2s;
  cursor: pointer;
}
.spark-bar:hover { opacity: 0.7; }
.trend-dates {
  display: flex;
  justify-content: space-between;
  font-size: 8px;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'Share Tech Mono', monospace;
}

/* ── METRIC CARDS ── */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.metric-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: border-color 0.2s;
}
.metric-card:hover { border-color: var(--border2); }
.metric-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
}
.metric-icon {
  font-size: 18px;
  margin-bottom: 8px;
  display: block;
}
.metric-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.metric-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 32px;
  line-height: 1;
  color: #fff;
}
.metric-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}
.metric-delta {
  position: absolute;
  top: 12px; right: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
}
.delta-up   { background: #0a2018; color: var(--green); }
.delta-down { background: #1a0a0a; color: var(--red); }
.delta-flat { background: var(--dim); color: var(--muted); }

/* ── MIDDLE ROW ── */
.mid-row {
  display: grid;
  grid-template-columns: 1fr 1fr 280px;
  gap: 14px;
}

/* ── PANEL BASE ── */
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.panel-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 2px;
  color: #fff;
  margin-bottom: 4px;
}
.panel-sub {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 14px;
}

/* ── PITCH HEATMAP ── */
.pitch-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/10;
  border-radius: 4px;
  overflow: hidden;
  background: #061009;
  border: 1px solid var(--border);
}
.pitch-svg { width: 100%; height: 100%; }

/* ── RADAR CHART ── */
.radar-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 0;
}

/* ── EVENT TIMELINE ── */
.timeline-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
.event-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  font-size: 11px;
  transition: border-color 0.15s;
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}
.event-row:hover { border-color: var(--border2); }
.event-time {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  width: 32px;
  flex-shrink: 0;
}
.event-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.event-name { flex: 1; color: var(--text); font-weight: 400; }
.event-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  padding: 2px 6px;
  border-radius: 2px;
  letter-spacing: 1px;
}

/* ── BOTTOM ROW ── */
.bottom-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ── BAR CHART ── */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-session {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  width: 50px;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  height: 8px;
  background: var(--dim);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.4,0,0.2,1);
}
.bar-val {
  font-family: 'Barlow Condensed', monospace;
  font-weight: 600;
  font-size: 13px;
  color: #fff;
  width: 30px;
  text-align: right;
}

/* ── GK PANEL ── */
.gk-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.gk-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 10px 12px;
  text-align: center;
}
.gk-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 26px;
  color: #fff;
  line-height: 1;
}
.gk-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1px;
  margin-top: 3px;
}
.save-zones {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 3px;
  aspect-ratio: 2/1;
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
}
.save-zone {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  cursor: default;
  transition: background 0.2s;
}

/* ── TAB SWITCHER ── */
.tabs { display: flex; gap: 2px; margin-bottom: 14px; }
.tab {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: all 0.15s;
}
.tab.active { background: var(--green); color: #040a06; border-color: var(--green); }
.tab:hover:not(.active) { color: var(--text); border-color: var(--border2); }

/* ── SECTION LABELS ── */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.section-line { height: 1px; flex: 1; background: var(--border); }
.section-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 3px;
}

/* ── COMPARE TABLE ── */
.compare-table { width: 100%; border-collapse: collapse; }
.compare-table th {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 2px;
  text-align: left;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}
.compare-table td {
  padding: 7px 8px;
  font-size: 11px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.compare-table tr:last-child td { border-bottom: none; }
.compare-table tr:hover td { background: var(--surface); }
.rank-1 { color: var(--green); font-weight: 600; }
.rank-2 { color: var(--amber); }
.rank-3 { color: var(--blue); }

/* animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.4s ease both; }
.fade-up:nth-child(1) { animation-delay: 0.05s; }
.fade-up:nth-child(2) { animation-delay: 0.10s; }
.fade-up:nth-child(3) { animation-delay: 0.15s; }
.fade-up:nth-child(4) { animation-delay: 0.20s; }
.fade-up:nth-child(5) { animation-delay: 0.25s; }
</style>
</head>

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function metricCard(icon, label, value, sub, color, delta) {
  const up = delta.startsWith('+');
  const zero = delta === '0';
  const cls = zero ? 'delta-flat' : up ? 'delta-up' : 'delta-down';
  return `
  <div class="metric-card fade-up" style="border-bottom:2px solid ${color}22">
    <div class="metric-delta ${cls}">${delta}</div>
    <span class="metric-icon">${icon}</span>
    <div class="metric-label">${label}</div>
    <div class="metric-value" style="color:${color}">${value}</div>
    <div class="metric-sub">${sub}</div>
  </div>`;
}

function buildPitchSVG(p) {
  const pos = p.pos;
  // heatmap blobs based on position
  const blobs = pos==='FWD' ? [
    {cx:75,cy:50,r:18,o:0.7},{cx:80,cy:35,r:12,o:0.5},{cx:70,cy:65,r:10,o:0.4},{cx:60,cy:45,r:8,o:0.3}
  ] : pos==='MID' ? [
    {cx:55,cy:50,r:20,o:0.7},{cx:65,cy:40,r:12,o:0.5},{cx:45,cy:55,r:14,o:0.4},{cx:60,cy:60,r:8,o:0.3}
  ] : [
    {cx:25,cy:50,r:18,o:0.7},{cx:30,cy:35,r:12,o:0.5},{cx:20,cy:65,r:10,o:0.4},{cx:35,cy:45,r:8,o:0.3}
  ];
  return pitchBase(blobs, p.color);
}

function buildGKPitchSVG(p) {
  const blobs = [
    {cx:10,cy:50,r:14,o:0.8},{cx:15,cy:40,r:8,o:0.5},{cx:15,cy:60,r:8,o:0.4},{cx:20,cy:50,r:6,o:0.3}
  ];
  return pitchBase(blobs, p.color);
}

function pitchBase(blobs, color) {
  const hex = color.replace('#','');
  return `
  <svg class="pitch-svg" viewBox="0 0 100 62" xmlns="http://www.w3.org/2000/svg">
    <defs>
      ${blobs.map((b,i)=>`
      <radialGradient id="blob${i}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${color}" stop-opacity="${b.o}"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </radialGradient>`).join('')}
    </defs>
    <!-- pitch markings -->
    <rect x="1" y="1" width="98" height="60" fill="none" stroke="#1a3025" stroke-width="0.5"/>
    <line x1="50" y1="1" x2="50" y2="61" stroke="#1a3025" stroke-width="0.4"/>
    <circle cx="50" cy="31" r="9.15" fill="none" stroke="#1a3025" stroke-width="0.4"/>
    <circle cx="50" cy="31" r="0.5" fill="#1a3025"/>
    <!-- left penalty area -->
    <rect x="1" y="16.5" width="16.5" height="29" fill="none" stroke="#1a3025" stroke-width="0.4"/>
    <rect x="1" y="24.85" width="5.5" height="12.3" fill="none" stroke="#1a3025" stroke-width="0.3"/>
    <!-- right penalty area -->
    <rect x="82.5" y="16.5" width="16.5" height="29" fill="none" stroke="#1a3025" stroke-width="0.4"/>
    <rect x="93.5" y="24.85" width="5.5" height="12.3" fill="none" stroke="#1a3025" stroke-width="0.3"/>
    <!-- heatmap blobs -->
    ${blobs.map((b,i)=>`
    <ellipse cx="${b.cx}" cy="${b.cy}" rx="${b.r}" ry="${b.r*0.7}" fill="url(#blob${i})"/>`).join('')}
  </svg>`;
}

function buildRadar(p) {
  const labels = ['PASSING','SHOOTING','SPRINTING','DRIBBLING','CONTROL','DEFENDING'];
  const vals = [p.passAcc, Math.round(p.shotsOnTarget/p.shots*100)||0, Math.round(p.sprintMax/10*100), p.dribbleAcc, p.control, Math.round((p.tackles+p.intercepts)/10*100)];
  const best = [88, 70, 90, 80, 90, 85];
  const cx=100, cy=100, r=75;
  const n=labels.length;
  function pt(val, idx, radius) {
    const angle = (Math.PI*2/n)*idx - Math.PI/2;
    const d = (val/100)*radius;
    return [cx+Math.cos(angle)*d, cy+Math.sin(angle)*d];
  }
  const grid = [25,50,75,100].map(pct => {
    const pts = labels.map((_,i)=>pt(pct,i,r).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="var(--border)" stroke-width="${pct===100?0.8:0.4}"/>`;
  }).join('');
  const axes = labels.map((_,i)=>{
    const [x,y]=pt(100,i,r);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
  }).join('');
  const bestPts = labels.map((_,i)=>pt(best[i],i,r).join(',')).join(' ');
  const curPts  = labels.map((_,i)=>pt(vals[i],i,r).join(',')).join(' ');
  const lbs = labels.map((l,i)=>{
    const [x,y]=pt(115,i,r);
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-family="Share Tech Mono" font-size="6" fill="var(--muted)">${l}</text>`;
  }).join('');
  return `
  <svg viewBox="0 0 200 200" width="200" height="200">
    ${grid}${axes}
    <polygon points="${bestPts}" fill="${selected.color}15" stroke="${selected.color}40" stroke-width="1"/>
    <polygon points="${curPts}"  fill="${selected.color}30" stroke="${selected.color}" stroke-width="1.5"/>
    ${labels.map((_,i)=>{
      const [x,y]=pt(vals[i],i,r);
      return `<circle cx="${x}" cy="${y}" r="2.5" fill="${selected.color}"/>`;
    }).join('')}
    ${lbs}
    <!-- legend -->
    <rect x="10" y="185" width="8" height="2" fill="${selected.color}40" stroke="${selected.color}40"/>
    <text x="22" y="188" font-family="Share Tech Mono" font-size="6" fill="var(--muted)">BEST</text>
    <rect x="60" y="185" width="8" height="2" fill="${selected.color}" stroke="${selected.color}"/>
    <text x="72" y="188" font-family="Share Tech Mono" font-size="6" fill="var(--muted)">SESSION</text>
  </svg>`;
}

function animateBars() {
  document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
    const w = el.dataset.w;
    setTimeout(() => { el.style.width = w + '%'; }, 100);
  });
}

function animateRing() {
  // ring already set via SVG attribute
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildSidebar();
renderMain();
</script>
